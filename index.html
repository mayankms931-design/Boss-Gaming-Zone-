<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Boss Hub | 30+ Premium AI Tools Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); color: #f8fafc; min-height: 100vh; }
        .tool-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px); transition: 0.4s; border: 1px solid rgba(255,255,255,0.1); }
        .tool-card:hover { transform: translateY(-10px); border-color: #38bdf8; box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="font-sans">

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 sticky top-0 z-50">
        <h1 class="text-2xl font-black text-sky-400 tracking-tighter cursor-pointer">AI BOSS HUB 💎</h1>
        <a href="#submit-form" class="bg-sky-600 hover:bg-sky-500 px-6 py-2 rounded-full font-bold text-sm transition shadow-lg shadow-sky-900/20">Add Your Tool</a>
    </nav>

    <header class="py-16 text-center px-4">
        <h2 class="text-4xl md:text-6xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-purple-500">The Ultimate AI Directory</h2>
        <p class="text-slate-400 max-w-2xl mx-auto text-lg">Boss, यहाँ दुनिया के सबसे पावरफुल 30+ AI टूल्स की लिस्ट है। काम को स्मार्ट बनाइये!</p>
    </header>

    <main id="tools-container" class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 mb-20">
        </main>

    <script>
        const tools = [
            {name: "ChatGPT", cat: "Chatbot", desc: "The world's most popular AI for writing and code."},
            {name: "Midjourney", cat: "Art", desc: "High-quality AI image generation."},
            {name: "Gemini", cat: "Assistant", desc: "Google's powerful multimodal AI model."},
            {name: "Claude", cat: "Writing", desc: "Safe and creative AI for long-form content."},
            {name: "ElevenLabs", cat: "Voice", desc: "Hyper-realistic AI voice cloning."},
            {name: "Runway Gen-2", cat: "Video", desc: "Next-gen text-to-video generation."},
            {name: "GitHub Copilot", cat: "Coding", desc: "Your personal AI pair programmer."},
            {name: "Canva AI", cat: "Design", desc: "Magic design tools for creators."},
            {name: "Perplexity", cat: "Search", desc: "AI-powered factual search engine."},
            {name: "Jasper", cat: "Marketing", desc: "AI for high-converting ad copies."},
            {name: "Descript", cat: "Video Editing", desc: "Edit video like a Word document."},
            {name: "Suno AI", cat: "Music", desc: "Create full songs with AI lyrics."},
            {name: "Gamma", cat: "Presentation", desc: "AI that creates PPTs in seconds."},
            {name: "Dall-E 3", cat: "Image", desc: "Turn simple ideas into visuals via ChatGPT."},
            {name: "Otter.ai", cat: "Meeting", desc: "AI notes and transcription for meetings."},
            {name: "Grammarly", cat: "Writing", desc: "Fix grammar and tone with AI."},
            {name: "Notion AI", cat: "Productivity", desc: "Write and organize faster inside Notion."},
            {name: "Leonardo.ai", cat: "Game Art", desc: "Advanced AI image and asset creation."},
            {name: "Pika Labs", cat: "Animation", desc: "Animate your photos into videos."},
            {name: "Phind", cat: "Search", desc: "The search engine for developers."},
            {name: "Adobe Firefly", cat: "Design", desc: "Generative AI inside Photoshop."},
            {name: "Synthesia", cat: "Avatar", desc: "AI avatars for professional videos."},
            {name: "Tome", cat: "Storytelling", desc: "AI powered storytelling and decks."},
            {name: "Quillbot", cat: "Writing", desc: "The best AI paraphrasing tool."},
            {name: "Remove.bg", cat: "Image", desc: "AI background removal in one click."},
            {name: "Luma Dream Machine", cat: "Video", desc: "Cinematic text-to-video tool."},
            {name: "Cursor", cat: "Coding", desc: "The AI code editor for speed."},
            {name: "Soundraw", cat: "Music", desc: "AI music generator for YouTubers."},
            {name: "Copy.ai", cat: "Marketing", desc: "Automate your marketing workflows."},
            {name: "Character.ai", cat: "Fun", desc: "Chat with fictional AI characters."}
        ];

        const container = document.getElementById('tools-container');
        tools.forEach(tool => {
            container.innerHTML += `
                <div class="tool-card p-6 rounded-3xl">
                    <div class="flex items-center justify-between mb-4">
                        <span class="px-3 py-1 bg-sky-900/40 text-sky-400 text-[10px] font-black uppercase rounded-lg border border-sky-800/50">${tool.cat}</span>
                    </div>
                    <h3 class="text-2xl font-bold mb-2">${tool.name}</h3>
                    <p class="text-slate-400 text-sm leading-relaxed mb-6">${tool.desc}</p>
                    <button class="w-full py-2 bg-slate-800 hover:bg-sky-600 rounded-xl transition font-bold text-xs uppercase tracking-wider">Visit Website</button>
                </div>
            `;
        });
    </script>

    <section id="submit-form" class="max-w-2xl mx-auto my-20 p-8 bg-slate-900/50 rounded-[40px] border border-sky-500/10 backdrop-blur-md">
        <h2 class="text-3xl font-bold mb-2 text-center">Add Your AI Tool 🚀</h2>
        <p class="text-slate-500 text-center mb-8 text-sm">अपनी वेबसाइट यहाँ लिस्ट करवाएं और ट्रैफिक पाएं!</p>
        <form class="space-y-4">
            <input type="text" placeholder="AI Tool Name" class="w-full p-4 rounded-2xl bg-slate-800/50 border border-slate-700 focus:border-sky-500 outline-none">
            <input type="email" placeholder="Your Email" class="w-full p-4 rounded-2xl bg-slate-800/50 border border-slate-700 focus:border-sky-500 outline-none">
            <textarea placeholder="Description" class="w-full p-4 rounded-2xl bg-slate-800/50 border border-slate-700 focus:border-sky-500 outline-none h-28"></textarea>
            <button type="button" class="w-full py-4 bg-gradient-to-r from-sky-600 to-blue-700 rounded-2xl font-black text-lg shadow-xl shadow-sky-600/20 active:scale-95 transition">SUBMIT NOW</button>
        </form>
    </section>

    <footer class="text-center py-10 text-slate-600 text-xs border-t border-slate-800/50">
        &copy; 2026 AI BOSS HUB | Created by <span class="text-sky-400 font-bold">Boss</span>
    </footer>

</body>
</html>
