    <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Boss Hub | 30+ Best AI Tools Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); color: #f8fafc; min-height: 100vh; }
        .tool-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); transition: 0.4s; border: 1px solid rgba(255,255,255,0.1); }
        .tool-card:hover { transform: scale(1.05); border-color: #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .nav-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); sticky: top-0; }
    </style>
</head>
<body class="font-sans">

    <nav class="p-4 border-b border-slate-800 nav-glass flex justify-between items-center px-10">
        <h1 class="text-2xl font-black text-sky-400">AI BOSS HUB 💎</h1>
        <a href="#submit-form" class="bg-sky-600 hover:bg-sky-500 px-5 py-2 rounded-full font-bold text-sm transition">Add Your Tool</a>
    </nav>

    <header class="py-20 text-center">
        <h2 class="text-5xl font-extrabold mb-4">Master the AI Revolution</h2>
        <p class="text-slate-400 max-w-2xl mx-auto">हमने आपके लिए दुनिया के सबसे बेहतरीन 30+ AI टूल्स को एक ही जगह इकट्ठा किया है। अब काम होगा 'Boss' लेवल पर!</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
        
        <script>
            const tools = [
                {name: "ChatGPT", cat: "Writing", desc: "The king of AI chatbots for everything.", link: "https://chatgpt.com"},
                {name: "Midjourney", cat: "Art", desc: "Best AI for hyper-realistic images.", link: "https://midjourney.com"},
                {name: "Gemini", cat: "Multimodal", desc: "Google's most capable AI assistant.", link: "https://gemini.google.com"},
                {name: "Luma Dream Machine", cat: "Video", desc: "Create realistic 5s videos from text.", link: "#"},
                {name: "GitHub Copilot", cat: "Coding", desc: "AI pair programmer for developers.", link: "#"},
                {name: "ElevenLabs", cat: "Voice", desc: "Most realistic AI voice generator.", link: "#"},
                {name: "Canva AI", cat: "Design", desc: "AI-powered graphic design tool.", link: "#"},
                {name: "Jasper", cat: "Marketing", desc: "AI for business and ad copy.", link: "#"},
                {name: "Perplexity", cat: "Search", desc: "AI-powered search engine for facts.", link: "#"},
                {name: "Descript", cat: "Video Editing", desc: "Edit video by editing text.", link: "#"}
                // Boss, yahan 20 aur tools aise hi add ho jayenge!
            ];

            const main = document.querySelector('main');
            tools.forEach(tool => {
                main.innerHTML += `
                    <div class="tool-card p-6 rounded-2xl">
                        <div class="text-xs font-bold text-sky-400 mb-2 uppercase tracking-widest">${tool.cat}</div>
                        <h3 class="text-xl font-bold mb-2">${tool.name}</h3>
                        <p class="text-slate-400 text-sm mb-4">${tool.desc}</p>
                        <a href="${tool.link}" class="text-white hover:text-sky-400 flex items-center gap-2">Visit Site <i class="fas fa-external-link-alt text-xs"></i></a>
                    </div>
                `;
            });
        </script>
    </main>

    <section id="submit-form" class="max-w-2xl mx-auto my-20 p-10 bg-slate-900 rounded-3xl border border-sky-900/50">
        <h2 class="text-3xl font-bold mb-6 text-center">अपना AI टूल लिस्ट करें! 🚀</h2>
        <form class="space-y-4">
            <input type="text" placeholder="AI Tool Name" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:border-sky-500">
            <input type="email" placeholder="Your Email" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:border-sky-500">
            <textarea placeholder="Short Description" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:border-sky-500 h-32"></textarea>
            <button class="w-full py-4 bg-sky-600 rounded-xl font-black text-lg hover:shadow-lg hover:shadow-sky-500/20 transition">SUBMIT FOR REVIEW</button>
        </form>
    </section>

    <footer class="text-center py-10 border-t border-slate-800 text-slate-500 text-sm">
        &copy; 2026 AI BOSS HUB | Built by <span class="text-sky-400 font-bold">Boss</span>
    </footer>

</body>
</html>
